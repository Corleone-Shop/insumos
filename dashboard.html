<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insumos Bodega — Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="header-inner">
    <div class="header-brand">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M20 7H4C2.9 7 2 7.9 2 9V19C2 20.1 2.9 21 4 21H20C21.1 21 22 20.1 22 19V9C22 7.9 21.1 7 20 7Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M16 21V5C16 3.9 15.1 3 14 3H10C8.9 3 8 3.9 8 5V21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="brand-name">Insumos Bodega</span>
      <span class="brand-sep"></span>
      <span class="brand-tag">Gestión de inventario</span>
    </div>
    <div class="header-right">
      <div class="live-badge">
        <span class="live-dot"></span>
        <span id="clockEl">—</span>
      </div>
      <button onclick="exportPDF()" class="btn btn-ghost">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M21 15V19C21 20.1 20.1 21 19 21H5C3.9 21 3 20.1 3 19V15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M7 10l5 5 5-5M12 15V3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Exportar PDF</span>
      </button>
      <button onclick="logout()" class="btn btn-dim">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M9 21H5C3.9 21 3 20.1 3 19V5C3 3.9 3.9 3 5 3H9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Salir</span>
      </button>
    </div>
  </div>
</header>

<!-- MAIN -->
<main class="page-wrapper">

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Insumos</div>
      <div class="stat-value" id="statTotal">0</div>
      <div class="stat-sub">Tipos de insumos</div>
    </div>
    <div class="stat-card stat-accent-green">
      <div class="stat-label">Total unidades</div>
      <div class="stat-value" id="statUnidades">0</div>
      <div class="stat-sub">en stock</div>
    </div>
    <div class="stat-card stat-accent-amber">
      <div class="stat-label">Movimientos</div>
      <div class="stat-value" id="statMovimientos">0</div>
      <div class="stat-sub">registrados</div>
    </div>
    <div class="stat-card stat-accent-red">
      <div class="stat-label">Stock bajo</div>
      <div class="stat-value" id="statBajo">0</div>
      <div class="stat-sub">≤ 5 unidades</div>
    </div>
  </div>

  <!-- MAIN GRID -->
  <div class="main-grid">

    <!-- AGREGAR -->
    <div class="card">
      <div class="card-head">
        <div class="icon-box icon-green">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="card-title">Agregar Insumo</span>
        <span class="pill">ENTRADA</span>
      </div>
      <div class="card-body">
        <div class="field">
          <label for="nombre">Insumos</label>
          <input id="nombre" type="text" placeholder="Que insumos?">
        </div>
        <div class="field">
          <label for="cantidad">Cantidad</label>
          <input id="cantidad" type="number" placeholder="0" min="1">
        </div>
        <button onclick="agregar()" class="btn btn-white btn-block">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Registrar entrada
        </button>
      </div>
    </div>

    <!-- RETIRAR -->
    <div class="card">
      <div class="card-head">
        <div class="icon-box icon-red">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="card-title">Retirar Insumo</span>
        <span class="pill">SALIDA</span>
      </div>
      <div class="card-body">

        <!-- Búsqueda de insumo con autocomplete -->
        <div class="field">
          <label for="retiroInsumo">Buscar insumo en stock</label>
          <div class="search-wrap">
            <input
              id="retiroInsumo"
              type="text"
              placeholder="Escriba para buscar..."
              autocomplete="off"
              oninput="onInsumoSearch(this.value)"
              onkeydown="onInsumoKey(event)"
            >
            <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none">
              <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="1.5"/>
              <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <div id="acList" class="ac-list"></div>
          </div>
          <div id="stockHint" class="stock-hint"></div>
        </div>

        <div class="field">
          <label for="cantidadRetiro">Cantidad a retirar</label>
          <input id="cantidadRetiro" type="number" placeholder="0" min="1">
        </div>

        <!-- Nombre de equipo — campo libre, sin relación con insumos -->
        <div class="field">
          <label for="equipo">Nombre del equipo</label>
          <input id="equipo" type="text" placeholder="Ej: Compresor A3, Torno CNC-2...">
        </div>

        <div class="field">
          <label for="quienRetira">Responsable</label>
          <input id="quienRetira" type="text" placeholder="Nombre de quien retira">
        </div>

        <div class="field-row">
          <div class="field" style="margin-bottom:0">
            <label for="os">OS <span class="opt">(opcional)</span></label>
            <input id="os" type="text" placeholder="OS-2024-001">
          </div>
          <div class="field" style="margin-bottom:0">
            <label for="cot">COT <span class="opt">(opcional)</span></label>
            <input id="cot" type="text" placeholder="COT-2024-001">
          </div>
        </div>

        <button onclick="retirar()" class="btn btn-white btn-block">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Registrar salida
        </button>
      </div>
    </div>

    <!-- STOCK TABLE — full width -->
    <div class="card full-col">
      <div class="card-head">
        <div class="icon-box icon-amber">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M9 5H7C5.9 5 5 5.9 5 7V19C5 20.1 5.9 21 7 21H17C18.1 21 19 20.1 19 19V7C19 5.9 18.1 5 17 5H15M9 5C9 5.6 9.4 6 10 6H14C14.6 6 15 5.6 15 5M9 5C9 4.4 9.4 4 10 4H14C14.6 4 15 4.4 15 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="card-title">Stock Actual</span>
        <span class="pill">INVENTARIO</span>
      </div>
      <div class="card-body" style="padding: 0;">
        <div class="stock-scroll" id="stockWrap">
          <div class="empty" id="stockEmpty">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M20 7H4C2.9 7 2 7.9 2 9V19C2 20.1 2.9 21 4 21H20C21.1 21 22 20.1 22 19V9C22 7.9 21.1 7 20 7Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <p>Sin componentes registrados</p>
          </div>
          <table id="stockTable" style="display:none;">
            <thead>
              <tr>
                <th>#</th>
                <th>Componente</th>
                <th>Unidades</th>
              </tr>
            </thead>
            <tbody id="stockBody"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div><!-- /main-grid -->
</main>

<!-- TOAST -->
<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>
