<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insumos Bodega — Acceso</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="login-body">

<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-wrap">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 7H4C2.9 7 2 7.9 2 9V19C2 20.1 2.9 21 4 21H20C21.1 21 22 20.1 22 19V9C22 7.9 21.1 7 20 7Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M16 21V5C16 3.9 15.1 3 14 3H10C8.9 3 8 3.9 8 5V21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1>Insumos Bodega</h1>
      <p class="sub">Sistema de gestión de inventario</p>
    </div>

    <form onsubmit="login(event)">
      <div class="field">
        <label for="user">Usuario</label>
        <input type="text" id="user" placeholder="Ingrese su usuario" required autocomplete="username">
      </div>
      <div class="field">
        <label for="pass">Contraseña</label>
        <input type="password" id="pass" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <div id="loginErr" class="err-box">Credenciales incorrectas. Intente nuevamente.</div>
      <button type="submit" class="btn btn-white btn-block" style="margin-top:0.5rem;">
        Iniciar sesión
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M5 12H19M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </form>

    <div class="login-footer">
      <p>DERECHO DE AUTOR &nbsp;·&nbsp; v1.0</p>
    </div>
  </div>
</div>

<script>
function login(e) {
  e.preventDefault();
  const u = document.getElementById('user').value;
  const p = document.getElementById('pass').value;
  const err = document.getElementById('loginErr');
  if (u === 'admin' && p === '1234') {
    localStorage.setItem('user', u);
    window.location.href = 'dashboard.html';
  } else {
    err.style.display = 'block';
    document.getElementById('pass').value = '';
    document.getElementById('pass').focus();
  }
}
</script>
</body>
</html>
